<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빌링서비스2팀 AI Agent 대시보드 v1.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #ffffff; color: #1f2633; min-height: 100vh; padding: 24px 16px; }
    .wrap { max-width: 1000px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 22px; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .ver { font-size: 12px; font-weight: 600; color: #2f6fed; background: #eef3fd; padding: 3px 9px; border-radius: 9px; vertical-align: middle; }
    .edit-bar { margin-top: 10px; display: flex; gap: 6px; justify-content: center; }
    .editing .card-title { outline: 1px dashed #2f6fed; border-radius: 5px; padding: 2px 4px; cursor: text; background: #f6f9ff; }
    .sub { color: #6b7688; font-size: 13px; }
    .category { margin-bottom: 18px; }
    .cat-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; margin-bottom: 10px; font-weight: 700; font-size: 14px; color: #fff; }
    .cat-analysis { background: linear-gradient(90deg,#5158c9,#3b3f8f); }
    .cat-develop  { background: linear-gradient(90deg,#2a9d64,#1e6e46); }
    .cat-test     { background: linear-gradient(90deg,#c9962e,#8f6a1e); }
    .cat-common   { background: linear-gradient(90deg,#c94a82,#8f2f5a); }
    .cat-count { margin-left: auto; background: rgba(255,255,255,.25); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(225px, 1fr)); gap: 10px; }
    .card { background: #fff; border: 1px solid #dde3ee; border-radius: 11px; padding: 12px; cursor: pointer; display: flex; gap: 9px; align-items: flex-start; position: relative; transition: border-color .15s, transform .15s, box-shadow .15s; box-shadow: 0 1px 3px rgba(20,30,60,.06); }
    .card:hover { border-color: #2f6fed; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(20,30,60,.12); }
    .card-icon { font-size: 20px; }
    .card-title { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 2px; color: #1f2633; }
    .card-owner { font-size: 12px; color: #6b7688; }
    .card-num { position: absolute; top: 9px; right: 11px; font-size: 10px; color: #a5aec0; }
    .badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .badge.file { background: #e2f5e8; color: #1e7a3f; }
    .card-btns { display: flex; gap: 6px; margin-top: 8px; }
    .cbtn { border: none; border-radius: 7px; font-size: 11px; font-weight: 600; padding: 5px 10px; cursor: pointer; font-family: inherit; }
    .cbtn-desc { background: #eef3fd; color: #2f6fed; }
    .cbtn-desc:hover { background: #dce7fb; }
    .cbtn-dl { background: #e5484d; color: #fff; }
    .cbtn-dl:hover { background: #d63a3f; }
    /* modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(15,25,45,.45); z-index: 10; align-items: flex-start; justify-content: center; padding: 48px 16px; overflow-y: auto; }
    .modal.active { display: flex; }
    .modal-box { background: #fff; border: 1px solid #dde3ee; border-radius: 16px; max-width: 640px; width: 100%; padding: 28px; box-shadow: 0 16px 48px rgba(20,30,60,.22); }
    .modal-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .modal-head h2 { font-size: 20px; line-height: 1.4; flex: 1; }
    .close { background: none; border: none; color: #6b7688; font-size: 28px; cursor: pointer; line-height: 1; }
    .meta { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .meta-icon { font-size: 36px; }
    .meta-owner { font-weight: 700; font-size: 16px; }
    .legacy { font-size: 13px; color: #8a94a8; margin-top: 3px; }
    .sect { border-top: 1px solid #e8edf5; padding-top: 16px; margin-top: 16px; }
    .sect h3 { font-size: 16px; color: #2f6fed; margin-bottom: 10px; }
    .desc { font-size: 15px; line-height: 1.7; color: #3a4356; }
    .hint { font-size: 13px; color: #8a94a8; margin-bottom: 10px; }
    .file-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #eef2f8; }
    .file-name { flex: 1; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: #8a94a8; font-size: 13px; }
    .btn-dl { background: #2f6fed; color: #fff; text-decoration: none; font-size: 14px; padding: 7px 16px; border-radius: 9px; white-space: nowrap; }
    .btn-dl:hover { background: #1f5cd9; }
    .nofile { font-size: 14px; color: #8a94a8; padding: 8px 0; }
    .foot { text-align: center; margin-top: 32px; font-size: 13px; color: #a5aec0; }
    .foot a { color: #2f6fed; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🤖 빌링서비스2팀 AI Agent 대시보드 <span class="ver">v1.0</span></h1>
      <p class="sub">총 24개 Agent · 카드를 누르면 과제 설명과 공유 자료를 볼 수 있습니다</p>
      <div class="edit-bar">
        <button id="editBtn" class="cbtn cbtn-desc" onclick="toggleEdit()">✏️ 제목 편집</button>
        <button id="saveBtn" class="cbtn cbtn-dl" style="display:none" onclick="saveMeta()">💾 저장</button>
        <button id="cancelBtn" class="cbtn cbtn-desc" style="display:none" onclick="cancelEdit()">취소</button>
      </div>
    </header>
    <div id="board"></div>
    <p class="foot">투표 페이지: <a href="index.html">바로가기</a></p>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h2 id="mTitle"></h2>
        <button class="close" onclick="closeModal()">&times;</button>
      </div>
      <div class="meta">
        <span id="mIcon" class="meta-icon"></span>
        <div style="flex:1;">
          <div id="mOwner" class="meta-owner"></div>
          <div id="mLegacy" class="legacy"></div>
        </div>
        <span id="mNum" class="card-num" style="position:static;"></span>
      </div>
      <div class="sect">
        <h3>📖 과제 설명</h3>
        <p id="mDesc" class="desc"></p>
      </div>
      <div class="sect">
        <h3>📦 공유 자료</h3>
        <div id="mFiles"><div class="nofile">파일 목록 확인 중...</div></div>
        <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
          <button class="cbtn cbtn-dl" onclick="pickUpload()">📎 파일 업로드</button>
          <span id="upStatus" class="hint" style="margin:0;"></span>
          <input type="file" id="upInput" style="display:none" onchange="uploadFile(this.files[0]); this.value='';" />
        </div>
        <p class="hint" style="margin-top:6px;">업로드하면 GitHub에 저장되어 누구나 다운로드할 수 있습니다 (4MB 이하).</p>
      </div>
    </div>
  </div>

  <script>
    const OWNER = "ax3512", REPO = "AIAGENT", BRANCH = "main", DIR = "agents";

    // title = 현재 투표 과제명 기준 현행화 (투표 리스트에 없는 4명은 기존 Agent명 유지)
    // legacy = 기존 Agent명 (과제명과 다를 때 참고 표시)
    const META = {
      1:  { icon:"📧", title:"메일 Due-Date 알람 제공 AI Agent", owner:"이성규", legacy:null,
            desc:"수신 메일에서 기한(Due-Date)을 인식해 처리 마감 전에 알람을 제공하는 Agent입니다." },
      2:  { icon:"🛡️", title:"보안 취약점 식별", owner:"권희열", legacy:"코드 품질향상 및 보안 준수 자동화 Agent",
            desc:"소스 코드의 보안 취약점을 자동 식별하고 시큐어 코딩 규칙 준수 여부를 점검해 품질을 높이는 Agent입니다." },
      3:  { icon:"🌱", title:"LLM Wiki 소스 분석기", owner:"김남진", legacy:"Spring Codebase 분석 AI Agent",
            desc:"Spring 기반 코드베이스를 LLM으로 분석해 구조·호출관계를 Wiki 형태의 문서로 정리해 주는 소스 분석기입니다." },
      4:  { icon:"📖", title:"사용자 메뉴얼 자동 생성 Agent", owner:"문향은", legacy:"사용자 메뉴얼 작성 Agent",
            desc:"화면·기능 정보를 바탕으로 사용자 매뉴얼 초안을 자동 생성해 문서 작성 시간을 줄여주는 Agent입니다." },
      5:  { icon:"🔍", title:"IA기반 T/C 자동생성 Agent", owner:"이태규", legacy:"업무 지식 지존 검색 AI Agent",
            desc:"IA(요구사항 분석서)를 기반으로 테스트케이스를 자동 생성하고, 업무 지식(지존)을 검색·활용하는 Agent입니다." },
      6:  { icon:"✅", title:"배포 문서 기반 T/C 자동생성", owner:"임성식", legacy:"IA 테스트케이스 검증 AI Agent",
            desc:"배포 문서를 근거로 테스트케이스를 자동 생성·검증해 배포 전 테스트 누락을 방지하는 Agent입니다." },
      7:  { icon:"🗄️", title:"jdk 버전업 자동화", owner:"김건표", legacy:"개발 SQL 튜닝 및 검증 AI Agent / 운영 SR처리 Agent",
            link:"https://ktcorp365-my.sharepoint.com/:u:/g/personal/ax3512_kt_com/IQBpr6iHN3kYT6EzsOFRI88aAftp8iUy9FQJmwxmnc4nxPI",
            desc:"JDK 버전업 시 필요한 소스 수정 포인트를 자동 식별·변환하는 버전업 자동화 과제입니다." },
      8:  { icon:"📋", title:"개발 요구사항 영향도 검토 Agent", owner:"김예솔", legacy:null,
            desc:"개발 요구사항이 기존 시스템에 미치는 영향 범위를 자동 검토해 주는 Agent입니다." },
      9:  { icon:"🔎", title:"grep 명령어 지능화", owner:"박진현", legacy:"영향도 분석 AI Agent (grep-AI)",
            desc:"grep 검색을 지능화해 소스 영향도 분석을 빠르고 정확하게 수행하는 grep-AI Agent입니다." },
      10: { icon:"🗃️", title:"동료 검토 및 DB/WSDL 산출물 자동 생성", owner:"임근혜", legacy:"DB 신규 및 변경신청 및 인터페이스 정의서 생성 AI Agent",
            desc:"동료 검토를 지원하고 DB 변경신청서·WSDL 인터페이스 정의서 등 산출물을 자동 생성하는 Agent입니다." },
      11: { icon:"📱", title:"레퍼런스 개발 자동화 플랫폼", owner:"임진환", legacy:"유무선 정산 신규 상품 개발 자동화",
            desc:"유무선 정산 신규 상품(레퍼런스) 개발을 자동화하는 플랫폼 과제입니다. 개발 단계별 산출물 생성을 지원합니다." },
      12: { icon:"🏷️", title:"레퍼런스 개발 자동화", owner:"지수환", legacy:"조정사유(청구할인) 코드 레퍼런스 생성 및 검증 AI Agent",
            desc:"조정사유(청구할인) 코드 레퍼런스를 자동 생성·검증하는 레퍼런스 개발 자동화 Agent입니다." },
      14: { icon:"📚", title:"요온 지식 자산화", owner:"김자은", legacy:"IA기반 KMS 지식 현행화 Agent",
            desc:"요온 업무 지식을 자산화하고 IA를 기반으로 KMS 지식을 최신 상태로 현행화하는 Agent입니다." },
      15: { icon:"💡", title:"레퍼런스 개발 자동화", owner:"김재혁", legacy:"Bill 개발 도우미 AI Agent",
            desc:"Bill 개발 업무를 보조하며 레퍼런스 개발을 자동화하는 개발 도우미 Agent입니다." },
      16: { icon:"📊", title:"IA 산출물 자동 생성 Agent", owner:"박래준", legacy:"IA요구사항 분석을 통한 상품 레퍼런스 생성 및 검증 AI Agent",
            desc:"IA 요구사항을 분석해 상품 레퍼런스와 IA 산출물을 자동 생성·검증하는 Agent입니다." },
      17: { icon:"✏️", title:"배포 누락 방지 Agent", owner:"박예겸", legacy:"IA 작성 지원 AI Agent",
            desc:"배포 대상 파일·절차를 자동 점검해 배포 누락을 방지하는 Agent 과제입니다." },
      19: { icon:"🏆", title:"SQL 튜닝 지원 Agent", owner:"김현아", legacy:"품질점검 Agent",
            desc:"SQL 튜닝 포인트를 자동 분석·제안해 개발 품질을 높이는 SQL 튜닝 지원 Agent 과제입니다." },
      20: { icon:"🗂️", title:"정산 특화 산출물 생성 간소화 Agent", owner:"박세원", legacy:"AI 기반 데이터베이스 테이블 자동 추출 에이전트",
            desc:"정산 업무에 특화된 산출물 생성을 간소화하는 Agent 과제입니다." },
      21: { icon:"🤖", title:"UI 테스트 자동화 / TC 생성", owner:"이우성", legacy:"UI & 배치 TC TEST FULL 자동화 (MCP 기반) AI Agent",
            desc:"MCP 기반으로 UI 테스트와 배치 TC 생성·실행을 풀 자동화하는 Agent입니다." },
      22: { icon:"🔄", title:"SR 처리 개인 비서 - LLM Wiki 포함", owner:"이재현", legacy:"반복 업무 자동화 처리 통합 Agent",
            desc:"SR 처리를 돕는 개인 비서 Agent 과제로, LLM Wiki 지식 검색을 포함해 반복 업무를 통합 자동화합니다." },
      23: { icon:"📝", title:"레퍼런스 개발 자동화", owner:"이현정", legacy:"정기/비정기 정산레퍼런스 추가 대상 검증 및 생성 쿼리 작성, 산출물 자동화 Agent",
            desc:"정기/비정기 정산 레퍼런스 추가 대상을 검증하고 생성 쿼리·산출물 작성을 자동화하는 Agent입니다." },
      24: { icon:"🧾", title:"레퍼런스 개발 자동화", owner:"조영래", legacy:"청구서 파트 당월 개발과제 기준 정보 검증 도우미 Agent : AI게 맞아!",
            desc:"청구서 파트의 당월 개발과제 기준 정보를 검증하고 레퍼런스 개발을 자동화하는 Agent 과제입니다." },
      25: { icon:"💻", title:"SVN 변경 사항 식별 및 AI 기반 Check List 검증 자동화", owner:"한재윤", legacy:"넥사크로 Code AI Agent",
            desc:"SVN 변경 사항을 자동 식별하고 AI 기반 체크리스트로 검증을 자동화하는 과제입니다." },
      26: { icon:"🧮", title:"정산 검증 분석 자동화", owner:"윤석민", legacy:null,
            desc:"정산 결과 검증·분석 작업을 자동화하는 Agent 과제입니다." },
    };

    const CATEGORIES = [
      { cls:"cat-analysis", icon:"📋", name:"분석 Agent", nums:[3,8,9,16,17,20] },
      { cls:"cat-develop",  icon:"🔧", name:"개발 Agent", nums:[2,4,7,10,11,12,15,22,23,25] },
      { cls:"cat-test",     icon:"🧪", name:"테스트 Agent", nums:[6,19,21,24,26] },
      { cls:"cat-common",   icon:"🔀", name:"공통 / 운영 지원 Agent", nums:[1,5,14] },
    ];

    let sharedFiles = {}; // num -> [{name, size, path}]

    function fmtSize(b) { return b >= 1048576 ? (b/1048576).toFixed(1)+" MB" : (b/1024).toFixed(1)+" KB"; }
    function rawUrl(path) { return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/` + path.split("/").map(encodeURIComponent).join("/"); }

    function render() {
      document.getElementById("board").innerHTML = CATEGORIES.map(c => `
        <div class="category">
          <div class="cat-head ${c.cls}"><span>${c.icon}</span><span>${c.name}</span><span class="cat-count">${c.nums.length}</span></div>
          <div class="grid">
            ${c.nums.map(n => { const m = META[n]; const hasFile = (sharedFiles[n]||[]).length > 0; return `
              <div class="card" onclick="openModal(${n})">
                <div class="card-icon">${m.icon}</div>
                <div style="flex:1; min-width:0;">
                  <div class="card-title" data-num="${n}" ${editMode ? 'contenteditable="true" onclick="event.stopPropagation()"' : ''}>${m.title}</div>
                  <div class="card-owner">${m.owner}</div>
                  ${hasFile ? '<div class="badges"><span class="badge file">📦 자료</span></div>' : ''}
                  <div class="card-btns">
                    <button class="cbtn cbtn-desc" onclick="event.stopPropagation(); openModal(${n})">📖 설명</button>
                    <button class="cbtn cbtn-dl" onclick="event.stopPropagation(); downloadAgent(${n})">${editMode ? '🔗 링크 수정' : '⬇ 다운로드'}</button>
                  </div>
                </div>
                <span class="card-num">#${n}</span>
              </div>`; }).join("")}
          </div>
        </div>`).join("");
    }

    function openModal(n) {
      if (editMode) return; // 편집 중에는 모달 비활성
      currentModalAgent = n;
      document.getElementById("upStatus").textContent = "";
      const m = META[n];
      document.getElementById("mTitle").textContent = m.title;
      document.getElementById("mIcon").textContent = m.icon;
      document.getElementById("mOwner").textContent = "담당: " + m.owner;
      document.getElementById("mLegacy").textContent = m.legacy ? "기존 Agent: " + m.legacy : "";
      document.getElementById("mNum").textContent = "#" + n;
      document.getElementById("mDesc").textContent = m.desc;
      const files = sharedFiles[n] || [];
      let rows = files.map(f => `<div class="file-row"><span class="file-name">📄 ${f.name}</span><span class="file-size">${fmtSize(f.size)}</span><a class="btn-dl" href="${rawUrl(f.path)}" download>⬇ 다운로드</a></div>`).join("");
      if (m.link) rows = `<div class="file-row"><span class="file-name">🔗 공유 저장소 (SharePoint)</span><a class="btn-dl" href="${directLink(m.link)}" target="_blank">⬇ 다운로드</a></div>` + rows;
      document.getElementById("mFiles").innerHTML = rows || '<div class="nofile">아직 공유된 파일이 없습니다.</div>';
      document.getElementById("modal").classList.add("active");
    }
    function closeModal() { document.getElementById("modal").classList.remove("active"); }

    // SharePoint/OneDrive 공유 링크를 즉시 다운로드 링크로 변환
    function directLink(url) {
      if (/sharepoint\.com|1drv\.ms|onedrive/.test(url) && !/download=1/.test(url)) {
        return url + (url.includes("?") ? "&" : "?") + "download=1";
      }
      return url;
    }

    function editLink(n) {
      const cur = META[n].link || "";
      const v = prompt("다운로드 링크 URL을 입력하세요 (비우면 링크 제거)", cur);
      if (v === null) return;
      META[n].link = v.trim() || null;
      render();
    }

    function downloadAgent(n) {
      if (editMode) { editLink(n); return; } // 편집 모드에서는 링크 수정
      if (META[n].link) { window.open(directLink(META[n].link), "_blank"); return; } // 외부(SharePoint 등) 다운로드 링크
      const files = sharedFiles[n] || [];
      if (files.length === 0) { alert("아직 업로드 전입니다."); return; }
      if (files.length === 1) { window.location.href = rawUrl(files[0].path); }
      else { openModal(n); } // 여러 개면 모달에서 선택
    }
    document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });

    async function loadFiles() {
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`);
        if (!res.ok) return;
        for (const item of (await res.json()).tree || []) {
          const m = item.path.match(new RegExp(`^${DIR}/(\\d+)/(.+)$`));
          if (m && item.type === "blob") (sharedFiles[m[1]] = sharedFiles[m[1]] || []).push({ name: m[2], size: item.size, path: item.path });
        }
        render(); // 📦 배지 갱신
      } catch (e) { /* 목록 실패해도 대시보드는 표시 */ }
    }

    // ===== 제목 편집 (agents_meta.json 을 GitHub 에 저장) =====
    const META_PATH = "agents_meta.json";
    let editMode = false;

    async function loadMeta() {
      try {
        // contents API 는 CDN 캐시가 없어 저장 직후에도 최신 제목을 읽는다
        let res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${META_PATH}?ref=${BRANCH}&t=${Date.now()}`,
          { headers: { Accept: "application/vnd.github.raw" }, cache: "no-store" });
        if (!res.ok) { // API 한도 초과 시 raw 로 폴백
          res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${META_PATH}?t=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) return;
        }
        const saved = await res.json();
        for (const [n, v] of Object.entries(saved)) {
          if (!META[n]) continue;
          if (v.title) META[n].title = v.title;
          if (v.link !== undefined) META[n].link = v.link || null;
        }
        render();
      } catch (e) { /* 저장본 없으면 기본값 사용 */ }
    }

    function toggleEdit() {
      editMode = true;
      document.body.classList.add("editing");
      document.getElementById("editBtn").style.display = "none";
      document.getElementById("saveBtn").style.display = "";
      document.getElementById("cancelBtn").style.display = "";
      render();
      alert("제목은 카드에서 직접 클릭해 수정, 다운로드 링크는 '🔗 링크 수정' 버튼으로 입력한 뒤 '저장'을 누르세요.");
    }

    function exitEdit() {
      editMode = false;
      document.body.classList.remove("editing");
      document.getElementById("editBtn").style.display = "";
      document.getElementById("saveBtn").style.display = "none";
      document.getElementById("cancelBtn").style.display = "none";
      render();
    }

    function cancelEdit() { exitEdit(); }

    const PROXY = "https://bill2-agent-proxy.netlify.app/.netlify/functions";

    async function saveMeta() {
      // 화면에서 수정된 제목 수집
      document.querySelectorAll(".card-title[data-num]").forEach(el => {
        const t = el.textContent.trim();
        if (t) META[el.dataset.num].title = t;
      });
      const titles = {};
      for (const [n, m] of Object.entries(META)) {
        titles[n] = { title: m.title };
        if (m.link) titles[n].link = m.link;
      }

      try {
        const res = await fetch(`${PROXY}/save-meta`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ titles }),
        });
        const data = await res.json();
        if (data.success) {
          alert("저장 완료! 다른 사람 화면에는 잠시 후 반영됩니다.");
          exitEdit();
        } else {
          alert("저장 실패: " + (data.error || res.status));
        }
      } catch (e) { alert("저장 오류: " + e.message); }
    }

    // ===== 파일 업로드 (프록시 경유, 무입력) =====
    let currentModalAgent = null;

    function pickUpload() { document.getElementById("upInput").click(); }

    async function uploadFile(file) {
      if (!file || currentModalAgent == null) return;
      const st = document.getElementById("upStatus");
      if (file.size > 4 * 1024 * 1024) { st.textContent = "4MB 이하 파일만 업로드할 수 있습니다."; return; }
      st.textContent = "업로드 중...";
      try {
        const buf = await file.arrayBuffer();
        let bin = ""; const bytes = new Uint8Array(buf);
        for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
        const res = await fetch(`${PROXY}/upload`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ num: currentModalAgent, name: file.name, content: btoa(bin) }),
        });
        const data = await res.json();
        if (data.success) {
          // GitHub API 캐시 지연이 있어 목록에 즉시 반영
          const list = sharedFiles[currentModalAgent] = sharedFiles[currentModalAgent] || [];
          if (!list.some(f => f.name === data.name)) {
            list.push({ name: data.name, size: file.size, path: `agents/${currentModalAgent}/${data.name}` });
          }
          openModal(currentModalAgent);
          render();
          st.textContent = "업로드 완료!";
        } else { st.textContent = "실패: " + (data.error || res.status); }
      } catch (e) { st.textContent = "오류: " + e.message; }
    }

    render();
    loadMeta();
    loadFiles();
  </script>
</body>
</html>
